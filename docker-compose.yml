version: "3.9"
services:
  model-api:
    build: ./model_api
    ports:
      - "5000:5000"
  jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "8080:8080"
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
