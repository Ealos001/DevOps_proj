global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Target: la tua app Flask
  - job_name: 'sentiment-app'
    static_configs:
      - targets: ['sentiment-app:5000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  

  # Target: Prometheus stesso
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 15s
